<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./styles.css">
        <title>Svg Editor</title>
    </head>

    <body>
        <div id="main-container">
            <div id="input-container">
                
            </div>

            <div id="svg-wrapper">
                <div id="transform-container"></div>
                <div id="svg-wrapper-buttons">
                    <div>
                        <label class="label-button" for="svg-file">Import Svg</label>
                        <input class="sr-only" type="file" name="svg-file" id="svg-file" accept=".svg,image/svg+xml" multiple>
                    </div>

                    <div class="flex">
                        <button>Base Rect</button>

                        <div class="dropdown-wrapper">
                            <div class="label-wrapper">
                                <label for="base-rect-width">Width: </label>
                                <input type="text" name="base-rect-width" id="">
                            </div>

                            <div class="label-wrapper">
                                <label for="base-rect-width">Heigth: </label>
                                <input type="text" name="base-rect-width" id="">
                            </div>                            
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>

    <script type="module" src="./app.js"></script>
</html>
